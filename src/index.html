<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gerenciador de Tarefas</h1>
            <span class="badge">PRODUÇÃO</span>
        </header>

        <div class="card">
            <h2>Status do Sistema</h2>
            <p id="db-status">Conectando...</p>
            <p id="db-version"></p>
        </div>

        <div class="card">
            <h2>📋 Tarefas</h2>
            <ul id="task-list"></ul>
        </div>
      
        <div class="card">
            <h2>➕ Nova Tarefa</h2>
            <input type="text" id="new-task" placeholder="Digite uma tarefa...">
            <button onclick="addTask()">Adicionar</button>
            <div id="output"></div>
        </div>

        <footer>
            <p>ADA Tech • DevSecOps Desafio</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
